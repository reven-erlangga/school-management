services:
  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: always
    environment:
      # Application
      NODE_ENV: production
      PORT: 3000
      
      # Database (PostgreSQL)
      # Ensure DATABASE_URL matches the postgres service
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/school_management?schema=public
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: 'false'
      
      # JWT (Example, should be overridden in production)
      JWT_SECRET: supersecretkey
      JWT_EXPIRATION: 1h
      JWT_REFRESH_SECRET: supersecretrefreshkey
      JWT_REFRESH_EXPIRATION: 7d

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - school-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:18
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_management
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - school-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - school-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - school-network
    ports:
      # Expose Console for management
      - "9001:9001"
      # Expose API for public access
      - "9000:9000"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  vault:
    image: hashicorp/vault:1.13.3
    container_name: vault
    restart: always
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_ADDR: 'http://0.0.0.0:8200'
    cap_add:
      - IPC_LOCK
    networks:
      - school-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"] 
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - school-network
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  school-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
