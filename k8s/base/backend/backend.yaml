apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-backend
  labels:
    app: school-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-backend
  template:
    metadata:
      labels:
        app: school-backend
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo "waiting for postgres..."; sleep 2; done']
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis 6379; do echo "waiting for redis..."; sleep 2; done']
      - name: wait-for-minio
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z minio 9000; do echo "waiting for minio..."; sleep 2; done']
      containers:
      - name: backend
        image: ghcr.io/reven-erlangga/school-management/backend:dev
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: school-backend-config
        - secretRef:
            name: school-backend-secret
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "50m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 10
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 45
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: school-backend
  labels:
    app: school-backend
spec:
  type: ClusterIP
  selector:
    app: school-backend
  ports:
  - port: 80
    targetPort: 3000
    name: http
