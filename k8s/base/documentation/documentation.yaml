apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-documentation
  labels:
    app: school-documentation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-documentation
  template:
    metadata:
      labels:
        app: school-documentation
    spec:
      containers:
      - name: documentation
        image: school-management/documentation:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: school-documentation
  labels:
    app: school-documentation
spec:
  type: ClusterIP
  selector:
    app: school-documentation
  ports:
  - port: 80
    targetPort: 80
    name: http
