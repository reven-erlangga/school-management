apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
spec:
  template:
    spec:
      containers:
      - name: vault
        args:
          - "server"
          - "-dev"
          - "-dev-listen-address=0.0.0.0:8200"
        env:
        - name: VAULT_DEV_ROOT_TOKEN_ID
          valueFrom:
            secretKeyRef:
              name: vault-secret
              key: root-token
---
apiVersion: v1
kind: Service
metadata:
  name: vault
spec:
  type: NodePort
  ports:
    - protocol: TCP
      port: 8200
      targetPort: 8200
      nodePort: 30005
      name: vault-port
