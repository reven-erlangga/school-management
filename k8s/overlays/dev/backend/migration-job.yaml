apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  annotations:
    argocd.argoproj.io/hook: Sync
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo "waiting for postgres..."; sleep 2; done']
      containers:
      - name: migrate
        image: ghcr.io/reven-erlangga/school-management/backend:dev
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Pushing schema to database (skipping migrations)..."
            npx prisma db push --accept-data-loss
        envFrom:
        - configMapRef:
            name: school-backend-config
        - secretRef:
            name: school-backend-secret
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: school-backend-secret
              key: DATABASE_URL
