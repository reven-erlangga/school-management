apiVersion: v1
kind: Secret
metadata:
  name: school-secret
  namespace: school-management
type: Opaque
stringData:
  postgres-password: "postgres"
  minio-root-user: "minioadmin"
  minio-root-password: "minioadmin"
  jwt-secret: "supersecretkey"
  jwt-refresh-secret: "supersecretrefreshkey"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-backend
  namespace: school-management
  labels:
    app: school-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-backend
  template:
    metadata:
      labels:
        app: school-backend
    spec:
      hostAliases:
      - ip: "127.0.0.1"
        hostnames:
        - "postgres"
        - "redis"
        - "minio"
        - "app"
        - "caddy"
      containers:
      # Postgres
      - name: postgres
        image: postgres:18
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: school-secret
              key: postgres-password
        - name: POSTGRES_DB
          value: "school_management"
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "10m"
            memory: "64Mi"
            
      # Redis
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          limits:
            cpu: "250m"
            memory: "128Mi"
          requests:
            cpu: "10m"
            memory: "32Mi"
            
      # MinIO
      - name: minio
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
        args:
        - server
        - /data
        - --console-address
        - :9001
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: school-secret
              key: minio-root-user
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: school-secret
              key: minio-root-password
        ports:
        - containerPort: 9000
          name: minio-api
        - containerPort: 9001
          name: minio-console
        volumeMounts:
        - name: minio-data
          mountPath: /data
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "10m"
            memory: "64Mi"

      # Backend App
      - name: app
        image: backend-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: app-http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@127.0.0.1:5432/school_management?schema=public"
        - name: REDIS_HOST
          value: "127.0.0.1"
        - name: REDIS_PORT
          value: "6379"
        - name: MINIO_ENDPOINT
          value: "127.0.0.1"
        - name: MINIO_PORT
          value: "9000"
        - name: MINIO_ACCESS_KEY
          value: "minioadmin"
        - name: MINIO_SECRET_KEY
          value: "minioadmin"
        - name: MINIO_USE_SSL
          value: "false"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: school-secret
              key: jwt-secret
        - name: JWT_EXPIRATION
          value: "1h"
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: school-secret
              key: jwt-refresh-secret
        - name: JWT_REFRESH_EXPIRATION
          value: "7d"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "10m"
            memory: "64Mi"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

      # Caddy
      - name: caddy
        image: caddy:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        volumeMounts:
        - name: caddy-data
          mountPath: /data
        - name: caddy-config
          mountPath: /config
        resources:
          limits:
            cpu: "250m"
            memory: "128Mi"
          requests:
            cpu: "10m"
            memory: "32Mi"
            
      volumes:
      - name: postgres-data
        emptyDir: {}
      - name: minio-data
        emptyDir: {}
      - name: caddy-data
        emptyDir: {}
      - name: caddy-config
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: school-backend
  namespace: school-management
spec:
  type: NodePort
  selector:
    app: school-backend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 31080
    name: http
  - port: 443
    targetPort: 443
    nodePort: 31443
    name: https
  - port: 3000
    targetPort: 3000
    nodePort: 31000
    name: app-api
  - port: 9000
    targetPort: 9000
    nodePort: 31900
    name: minio-api
  - port: 9001
    targetPort: 9001
    nodePort: 31901
    name: minio-console
