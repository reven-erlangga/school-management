apiVersion: v1
kind: Secret
metadata:
  name: vault-secret
  namespace: school-management
type: Opaque
stringData:
  # Initial root token for development. 
  # In production, this should be managed securely and not committed to git.
  root-token: "root"
---
apiVersion: v1
kind: Namespace
metadata:
  name: school-management
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: school-management
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
      - name: vault
        image: hashicorp/vault:1.21
        args:
          - "server"
          - "-dev"
          - "-dev-listen-address=0.0.0.0:8200"
        ports:
        - containerPort: 8200
          name: vault-port
        env:
        - name: VAULT_DEV_ROOT_TOKEN_ID
          valueFrom:
            secretKeyRef:
              name: vault-secret
              key: root-token
        securityContext:
          capabilities:
            add:
              - IPC_LOCK
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: school-management
spec:
  type: NodePort
  selector:
    app: vault
  ports:
    - protocol: TCP
      port: 8200
      targetPort: 8200
      nodePort: 30005
      name: vault-port
