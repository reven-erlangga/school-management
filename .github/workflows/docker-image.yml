name: Documentation Docker Image CI

on:
  push:
    branches: ["main", "dev", "release/**"]
    paths:
      - "documentation/**"
  pull_request:
    branches: ["main", "dev", "release/**"]
    paths:
      - "documentation/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          echo "ref_name_sanitized=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: ./documentation
          file: ./documentation/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/docs:latest
            ghcr.io/${{ github.repository }}/docs:${{ steps.vars.outputs.ref_name_sanitized }}
