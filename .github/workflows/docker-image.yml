name: Documentation Docker Image CI

on:
  push:
    branches: ["main", "dev", "staging"]
    tags: ["v*"]
    paths:
      - "documentation/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY}/docs"

          tags=()
          tags+=("${image}:sha-${GITHUB_SHA::7}")

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags+=("${image}:${GITHUB_REF_NAME}")
          else
            case "${GITHUB_REF_NAME}" in
              dev)
                tags+=("${image}:dev")
                ;;
              staging)
                tags+=("${image}:staging")
                ;;
              main)
                tags+=("${image}:latest")
                ;;
            esac
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: ./documentation
          file: ./documentation/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=docs
            org.opencontainers.image.description=School Management documentation image
