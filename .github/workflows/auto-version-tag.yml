name: Auto Tag Version (staging -> main)

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'staging' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Compute and create version tag
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const mergeSha = pr.merge_commit_sha;
            if (!mergeSha) {
              core.info('No merge_commit_sha found. Skipping.');
              return;
            }

            const labels = (pr.labels || []).map((l) => String(l.name || '').toLowerCase());

            const hasLabel = (name) => labels.includes(name);

            let bump = 'patch';
            if (hasLabel('major')) bump = 'major';
            else if (hasLabel('minor')) bump = 'minor';
            else if (hasLabel('patch')) bump = 'patch';

            let pre = '';
            if (hasLabel('alpha') || hasLabel('pre-alpha')) pre = 'alpha';
            else if (hasLabel('beta') || hasLabel('pre-beta')) pre = 'beta';
            else if (hasLabel('rc') || hasLabel('release-candidate') || hasLabel('pre-rc')) pre = 'rc';

            const prNumber = pr.number;
            const files = [];
            for (let page = 1; page <= 20; page++) {
              const resp = await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
                page,
              });
              files.push(...resp.data);
              if (resp.data.length < 100) break;
            }

            const docsTouched = files.some((f) => String(f.filename || '').startsWith('documentation/'));
            if (!docsTouched) {
              core.info('No documentation/** changes detected. Skipping tagging.');
              return;
            }

            const parseStable = (tag) => {
              const m = /^v(\d+)\.(\d+)\.(\d+)$/.exec(tag);
              if (!m) return null;
              return { major: Number(m[1]), minor: Number(m[2]), patch: Number(m[3]) };
            };

            const cmpStable = (a, b) => {
              if (a.major !== b.major) return a.major - b.major;
              if (a.minor !== b.minor) return a.minor - b.minor;
              return a.patch - b.patch;
            };

            const getAllTags = async () => {
              const tags = [];
              for (let page = 1; page <= 10; page++) {
                const resp = await github.rest.repos.listTags({
                  owner,
                  repo,
                  per_page: 100,
                  page,
                });
                tags.push(...resp.data.map((t) => String(t.name)));
                if (resp.data.length < 100) break;
              }
              return tags;
            };

            const allTags = await getAllTags();

            const stableTags = allTags
              .map(parseStable)
              .filter(Boolean)
              .sort(cmpStable);

            const latest = stableTags.length ? stableTags[stableTags.length - 1] : { major: 0, minor: 0, patch: 0 };

            let next = { ...latest };
            if (bump === 'major') next = { major: latest.major + 1, minor: 0, patch: 0 };
            else if (bump === 'minor') next = { major: latest.major, minor: latest.minor + 1, patch: 0 };
            else next = { major: latest.major, minor: latest.minor, patch: latest.patch + 1 };

            const base = `${next.major}.${next.minor}.${next.patch}`;
            let tag = `v${base}`;

            if (pre) {
              const re = new RegExp(`^v${base}-${pre}\\.(\\d+)$`);
              const nums = allTags
                .map((t) => {
                  const m = re.exec(t);
                  return m ? Number(m[1]) : null;
                })
                .filter((n) => typeof n === 'number')
                .sort((a, b) => a - b);
              const n = nums.length ? nums[nums.length - 1] + 1 : 1;
              tag = `v${base}-${pre}.${n}`;
            }

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Tag ${tag} already exists. Skipping.`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const tagObj = await github.rest.git.createTag({
              owner,
              repo,
              tag,
              message: `Release ${tag}`,
              object: mergeSha,
              type: 'commit',
            });

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: tagObj.data.sha,
            });

            core.info(`Created tag ${tag} at ${mergeSha}`);
