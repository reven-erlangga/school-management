name: Auto PR Template (Dev/Staging/Main)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  apply-template:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const head = pr.head.ref;
            const base = pr.base.ref;
            const body = (pr.body || '').trim();

            let templatePath = null;
            if (head === 'dev' && base === 'staging') {
              templatePath = '.github/PULL_REQUEST_TEMPLATE/dev-to-staging.md';
            } else if (head === 'staging' && base === 'main') {
              templatePath = '.github/PULL_REQUEST_TEMPLATE/staging-to-main.md';
            } else {
              return;
            }

            if (body.length > 0) {
              return;
            }

            const res = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: templatePath,
              ref: base,
            });

            if (!res?.data || Array.isArray(res.data) || res.data.type !== 'file') {
              throw new Error(`Template not found or not a file: ${templatePath}`);
            }

            const template = Buffer.from(res.data.content, res.data.encoding || 'base64').toString('utf8');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: template,
            });
